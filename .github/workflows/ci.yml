name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontends:
    name: Frontends (lint + test + build matrix)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        brand: [feelvonroll, wohlopti]
        include:
          - brand: feelvonroll
            apps: 'viewer admin'
          - brand: wohlopti
            apps: 'all'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm -r test

      - name: Build (${{ matrix.brand }})
        env:
          BRAND: ${{ matrix.brand }}
        run: |
          for app in ${{ matrix.apps }}; do
            APP="$app" pnpm build
          done

  api:
    name: PHP API (PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, pdo_sqlite
          coverage: none

      - run: composer install --no-interaction --prefer-dist
      - run: composer test
