name: Release (tag → build + deploy + GitHub Release)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_deploy:
    name: Build + Deploy (${{ matrix.brand }} / ${{ matrix.app }}) → ${{ matrix.deploy_branch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - brand: wohlopti
            app: all
            deploy_branch: deploy/wohlopti
          - brand: feelvonroll
            app: all
            deploy_branch: deploy/feelvonroll

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          BRAND: ${{ matrix.brand }}
          APP: ${{ matrix.app }}
        run: pnpm run build

      - name: Prepare deploy folder
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy-root
          mkdir -p deploy-root

          if [[ "${{ matrix.app }}" == "all" ]]; then
            cp -R dist/* deploy-root/
          elif [[ "${{ matrix.app }}" == "viewer" ]]; then
            cp -R apps/viewer/dist/* deploy-root/
          elif [[ "${{ matrix.app }}" == "admin" ]]; then
            mkdir -p deploy-root/admin
            cp -R apps/admin/dist/* deploy-root/admin/
          else
            echo "Unknown app: ${{ matrix.app }}"
            exit 1
          fi

          mkdir -p deploy-root/api
          rsync -a --delete \
            --exclude='config.local.php' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='vendor' \
            services/api/ deploy-root/api/

      - name: Publish deploy-root to branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: ${{ matrix.deploy_branch }}
          folder: deploy-root
          clean: true

  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build_deploy]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
