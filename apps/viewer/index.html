<!doctype html>
<html lang="en" style="background:%BRAND_BACKGROUND_COLOR%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="%BRAND_THEME_COLOR%" />
    <script>
      // iOS home-screen installs can ignore deep links when a manifest with
      // start_url is present. For station-specific shortcuts we keep the exact
      // URL by not attaching the manifest on iOS.
      (function attachManifestForNonIOS() {
        const ua = navigator.userAgent || ''
        const platform = navigator.platform || ''
        const isIOS =
          /iPad|iPhone|iPod/.test(ua) ||
          (platform === 'MacIntel' && navigator.maxTouchPoints > 1)
        if (isIOS) return
        const link = document.createElement('link')
        link.rel = 'manifest'
        link.href = '/manifest.json'
        document.head.appendChild(link)
      })()
    </script>
    <script>
      // Load Plausible everywhere except localhost to avoid polluting analytics during local dev.
      // Use first-party paths (/js/script.js, /api/event) so fewer adblockers block it.
      (function loadPlausible() {
        const host = (window.location && window.location.hostname) || ''
        const isLocalhost =
          host === 'localhost' ||
          host === '127.0.0.1' ||
          host === '0.0.0.0' ||
          host.endsWith('.local')
        if (isLocalhost) return

        const s = document.createElement('script')
        s.defer = true
        s.setAttribute('data-domain', '%BRAND_ANALYTICS_PLAUSIBLE_DOMAIN%')
        s.setAttribute('data-api', '/api/event')
        s.src = '/js/script.js'
        document.head.appendChild(s)
      })()
    </script>
    <title>%BRAND_VIEWER_TITLE%</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
